version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shopee_backend
    ports:
      - "8000:8000"
    environment:
      DATA_PATH: /app/data/cleaned

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopee_web
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend
